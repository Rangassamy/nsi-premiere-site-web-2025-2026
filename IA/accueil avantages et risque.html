        <div class="home-layout">

    <div class="angel-robot">
        <svg width="280" height="380" viewBox="0 0 280 380" xmlns="http://www.w3.org/2000/svg">
            <!-- Halo corrigé -->
            <ellipse cx="140" cy="30" rx="50" ry="12" fill="none" stroke="#cfefff" stroke-width="4"/>

            <!-- Ailes réalistes (plumes stylisées) -->
            <g fill="#eaf7ff">
                <path d="M40 180 C10 140, 20 90, 80 70 C70 120, 90 160, 120 190"/>
                <path d="M240 180 C270 140, 260 90, 200 70 C210 120, 190 160, 160 190"/>
            </g>

            <!-- Tête -->
            <circle cx="140" cy="95" r="38" fill="#a6e1ff"/>
            <circle cx="126" cy="90" r="4" fill="#1e3a5f"/>
            <circle cx="154" cy="90" r="4" fill="#1e3a5f"/>
            <path d="M128 108 Q140 115 152 108" stroke="#1e3a5f" stroke-width="2" fill="none"/>

            <!-- Cou -->
            <rect x="132" y="130" width="16" height="12" rx="6" fill="#7fc8ff"/>

            <!-- Torse -->
            <rect x="100" y="140" width="80" height="105" rx="20" fill="#7fc8ff"/>

            <!-- Bras gauche (épaule + avant-bras) -->
            <g>
                <rect x="70" y="155" width="35" height="16" rx="8" fill="#7fc8ff"/>
                <rect x="45" y="165" width="30" height="14" rx="7" fill="#7fc8ff"/>
            </g>

            <!-- Bras droit animé corrigé -->
            <g id="arm">
                <rect x="180" y="155" width="35" height="16" rx="8" fill="#7fc8ff"/>
                <rect x="215" y="165" width="30" height="14" rx="7" fill="#7fc8ff"/>
            </g>

            <!-- Jambes -->
            <rect x="120" y="245" width="20" height="65" rx="9" fill="#7fc8ff"/>
            <rect x="145" y="245" width="20" height="65" rx="9" fill="#7fc8ff"/>
        </svg>
    </div>
	
    <div class="devil-robot">
    <svg width="280" height="380" viewBox="0 0 280 380" xmlns="http://www.w3.org/2000/svg">

        
        <!-- Cornes triangulaires réalistes avec base large -->
		<polygon points="120,78 128,0 136,20" fill="#7a0c14"/>
		<polygon points="144,78 152,0 160,20" fill="#7a0c14"/>




        <!-- Tête -->
        <circle cx="140" cy="95" r="38" fill="#b11226"/>
        <!-- Yeux oranges qui clignotent -->
        <circle class="devil-eye" cx="126" cy="90" r="4" fill="orange"/>
        <circle class="devil-eye" cx="154" cy="90" r="4" fill="orange"/>
        <!-- Sourire terrifiant -->
        <path d="M125 110 Q140 130 155 110 Q140 145 125 110" stroke="#300" stroke-width="3" fill="none"/>

        <!-- Cou -->
        <rect x="132" y="130" width="16" height="12" rx="6" fill="#8c0f1f"/>

        <!-- Torse -->
        <rect x="100" y="140" width="80" height="105" rx="20" fill="#8c0f1f"/>

        <!-- Bras gauche -->
        <g>
            <rect x="70" y="155" width="35" height="16" rx="8" fill="#8c0f1f"/>
            <rect x="45" y="165" width="30" height="14" rx="7" fill="#8c0f1f"/>
        </g>

        <!-- Bras droit (fourche énorme + flamme) -->
        <g id="devil-arm">
            <rect x="180" y="155" width="35" height="16" rx="8" fill="#8c0f1f"/>
            <rect x="215" y="165" width="30" height="14" rx="7" fill="#8c0f1f"/>
            <!-- Fourche géante -->
            <line x1="245" y1="160" x2="245" y2="310" stroke="#7a0c14" stroke-width="6"/>
            <!-- Flamme au sommet -->
            <polygon points="242,310 248,310 245,320" fill="orange"/>
            <!-- Dents de la fourche -->
            <line x1="245" y1="160" x2="240" y2="170" stroke="#7a0c14" stroke-width="3"/>
            <line x1="245" y1="160" x2="250" y2="170" stroke="#7a0c14" stroke-width="3"/>
        </g>

        <!-- Jambes -->
        <rect x="120" y="245" width="20" height="65" rx="9" fill="#8c0f1f"/>
        <rect x="145" y="245" width="20" height="65" rx="9" fill="#8c0f1f"/>

        <!-- Queue gauche -->
        <path class="devil-tail-left" d="M100 240 C60 250, 50 300, 90 320" stroke="#7a0c14" stroke-width="6" fill="none"/>
        <polygon class="devil-tail-left-tip" points="88,320 100,330 95,310" fill="#7a0c14"/>

    </svg>
